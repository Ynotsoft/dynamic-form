name: Publish Form Library

on:
  push:
    branches:
      - main
    paths:
      - "packages/dynamic-form-lib/**"
  workflow_dispatch:
    # Allows for a manual re-run if a build failed due to a version conflict
    inputs:
      reason:
        description: "Reason for manual trigger (optional)"
        required: false
        default: "Manual retry"

permissions:
  contents: read
  id-token: write

jobs:
  publish-form:
    runs-on: ubuntu-latest
    env:
      PKG_DIR: "packages/dynamic-form-lib"
      PKG_NAME: "ynotsoft-dynamic-form"
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up .npmrc
        run: echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Build Library
        run: npm run build --workspace=${{ env.PKG_NAME }}

      - name: Determine Version and Tag
        id: info
        run: |
          # Extract version and name from the package.json within the lib folder
          VER=$(node -p "require('./${{ env.PKG_DIR }}/package.json').version")
          NAME=$(node -p "require('./${{ env.PKG_DIR }}/package.json').name")
          
          # Determine if this is a 'next' (pre-release) or 'latest' tag
          if [[ "$VER" == *-* ]]; then TAG="next"; else TAG="latest"; fi
          
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate Version Bump
        run: |
          PKG="${{ steps.info.outputs.name }}"
          VER="${{ steps.info.outputs.version }}"
          
          # Use npm view to check if this specific version is already live
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "::error::Version $VER of $PKG already exists on NPM. You must update package.json in your local branch and push again."
            exit 1
          fi

      - name: Publish to npm
        run: |
          npm publish ./${{ env.PKG_DIR }} --access public --provenance --tag "${{ steps.info.outputs.tag }}"
